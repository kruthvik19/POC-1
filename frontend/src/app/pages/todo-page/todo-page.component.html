<section class="page-shell">
  <div class="page-header">
    <div>
      <h2>Todo Page</h2>
      <p>Manage your tasks with create, update, complete, and delete actions.</p>
    </div>
    <button class="secondary" routerLink="/">Back to Home</button>
  </div>

  <div class="todo-add-form">
    <input
      type="text"
      placeholder="Enter task title"
      [(ngModel)]="newTitle"
      (keyup.enter)="addTodo()"
    />
    <button (click)="addTodo()" [disabled]="!newTitle.trim()">Add Task</button>
  </div>

  <div *ngIf="toastMessage" class="toast" [ngClass]="toastType">{{ toastMessage }}</div>
  <div *ngIf="error" class="error-banner">{{ error }}</div>

  <app-todo-list
    [todos]="todos"
    [editingId]="editingId"
    [editingTitle]="editingTitle"
    (edit)="startEdit($event)"
    (save)="saveTodo($event)"
    (cancel)="cancelEdit()"
    (toggle)="toggleCompleted($event)"
    (delete)="deleteTodo($event)">
  </app-todo-list>
</section>
